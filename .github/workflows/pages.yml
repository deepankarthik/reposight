name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths: [apps/web/public/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/public
      - uses: actions/deploy-pages@v5